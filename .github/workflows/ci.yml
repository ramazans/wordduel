name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

# Aynı dal için push + pull_request çift tetiklemesinde eskisini iptal et.
# head_ref (PR) ve ref_name (push) aynı dal adını üretir; düz github.ref
# kullanmak refs/pull/N/merge ile refs/heads/... ayrıştığı için işe yaramaz.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  match-engine-tests:
    name: Swift Packages (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"
      - name: Run MatchEngine tests
        working-directory: Packages/MatchEngine
        run: swift test --parallel
      - name: Run WordRepository tests
        working-directory: Packages/WordRepository
        run: swift test --parallel

  ios-build:
    name: iOS Build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      # Runner imajında simülatör runtime'ı yalnızca güncel Xcode'lar için kurulu
      # geliyor; sabit "Xcode_16.app" (16.0) seçmek "iOS 18.0 is not installed"
      # hatasına yol açıyordu. En yeni kurulu Xcode'u seçiyoruz.
      - name: Select latest installed Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_*.app | sort -V | tail -n 1)
          echo "Selected: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"
      - name: Show Xcode version
        run: xcodebuild -version
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: |
          xcodegen generate
          ls WordDuel.xcodeproj/xcshareddata/xcschemes/
      - name: Build app
        run: |
          # Cihaz adı Xcode sürümüne göre değişir (iPhone 16, 17, ...);
          # kurulu ilk uygun iPhone simülatörünü seç.
          DEVICE=$(xcrun simctl list devices available | grep -oE "iPhone [0-9][^(]*" | head -n 1 | xargs)
          DEVICE=${DEVICE:-iPhone 16}
          echo "Using simulator: $DEVICE"
          xcodebuild build \
            -project WordDuel.xcodeproj \
            -scheme WordDuel \
            -destination "platform=iOS Simulator,name=$DEVICE" \
            CODE_SIGNING_ALLOWED=NO
