name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  match-engine-tests:
    name: MatchEngine (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"
      - name: Run MatchEngine tests
        working-directory: Packages/MatchEngine
        run: swift test --parallel

  ios-build:
    name: iOS Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      # Runner imajında simülatör runtime'ı yalnızca güncel Xcode'lar için kurulu
      # geliyor; sabit "Xcode_16.app" (16.0) seçmek "iOS 18.0 is not installed"
      # hatasına yol açıyordu. En yeni kurulu Xcode'u seçiyoruz.
      - name: Select latest installed Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_*.app | sort -V | tail -n 1)
          echo "Selected: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"
      - name: Show Xcode version
        run: xcodebuild -version
      - name: Build & test
        run: |
          if [ -d "wordduel.xcodeproj" ]; then
            # Cihaz adı Xcode sürümüne göre değişir (iPhone 16, 17, ...);
            # kurulu ilk uygun iPhone simülatörünü seç.
            DEVICE=$(xcrun simctl list devices available | grep -oE "iPhone [0-9][^(]*" | head -n 1 | xargs)
            DEVICE=${DEVICE:-iPhone 16}
            echo "Using simulator: $DEVICE"
            xcodebuild test \
              -project wordduel.xcodeproj \
              -scheme wordduel \
              -destination "platform=iOS Simulator,name=$DEVICE" \
              -enableCodeCoverage YES \
              CODE_SIGNING_ALLOWED=NO
          else
            echo "Xcode project not yet generated; skipping iOS build."
          fi
