name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  match-engine-tests:
    name: MatchEngine (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"
      - name: Run MatchEngine tests
        working-directory: Packages/MatchEngine
        run: swift test --parallel

  ios-build:
    name: iOS Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app
      - name: Show Xcode version
        run: xcodebuild -version
      - name: Build & test
        run: |
          if [ -d "wordduel.xcodeproj" ]; then
            xcodebuild test \
              -project wordduel.xcodeproj \
              -scheme wordduel \
              -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
              -enableCodeCoverage YES \
              CODE_SIGNING_ALLOWED=NO
          else
            echo "Xcode project not yet generated; skipping iOS build."
          fi
