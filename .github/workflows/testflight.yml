name: TestFlight

# Manuel tetikleme (Actions sekmesi → TestFlight → Run workflow) veya
# `v*` etiketiyle (örn. `git tag v0.1.0 && git push --tags`).
on:
  workflow_dispatch:
    inputs:
      build_number:
        description: "Build numarası (boşsa GitHub run number kullanılır)"
        required: false
  push:
    tags:
      - "v*"

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: false

jobs:
  beta:
    name: Build & TestFlight'a yükle
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest installed Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_*.app | sort -V | tail -n 1)
          echo "Selected: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Decode App Store Connect API key
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          echo "$ASC_KEY_P8" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"

      # Kalıcı Apple Distribution sertifikası — her koşuda yeni sertifika
      # üretilmesini (ve hesabın sertifika limitine çarpmasını) önler.
      # Kurulum adımları için bkz. fastlane/Fastfile başındaki yorum.
      - name: Decode distribution certificate
        env:
          DIST_CERT_P12: ${{ secrets.DIST_CERT_P12 }}
        run: |
          if [ -z "$DIST_CERT_P12" ]; then
            echo "::error::DIST_CERT_P12 secret'ı tanımlı değil — kurulum için fastlane/Fastfile başındaki yorumu izleyin"
            exit 1
          fi
          echo "$DIST_CERT_P12" | base64 --decode > "$RUNNER_TEMP/dist.p12"

      - name: Build & upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DIST_CERT_P12_PATH: ${{ runner.temp }}/dist.p12
          DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
          BUILD_NUMBER: ${{ github.event.inputs.build_number || github.run_number }}
        run: bundle exec fastlane beta

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: WordDuel-ipa
          path: build/WordDuel.ipa
          if-no-files-found: ignore
